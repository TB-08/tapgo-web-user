<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập/Đăng Ký | TAPGO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>

    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif !important;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Be Vietnam Pro', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#F48133', hover: '#E06B1F', bg: '#FFF3EB' },
                        danger: '#EF4444', success: '#10B981',
                        tier: { silver: '#9CA3AF', gold: '#FBBF24', platinum: '#1F2937' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen w-screen relative overflow-hidden"
    x-data="{...getTapgoData(), tabAuth: new URLSearchParams(window.location.search).get('tab') || 'login', showPass: false}">

    <!-- Background Decor - Fixed to ensure full coverage -->
    <div class="fixed inset-0 z-0">
        <!-- Dashboard Mockup with Balanced Blur -->
        <img src="tapgo_vendor_v3_mockup_1777828672432.png" 
            class="absolute inset-0 w-full h-full object-cover opacity-85 blur-[3px]" 
            alt="Dashboard Background">
        
        <!-- Subtle Orange Glass Overlay -->
        <div class="absolute inset-0 bg-[#F48133]/20 backdrop-blur-[6px]"></div>
        <div class="absolute inset-0 bg-gradient-to-tr from-brand/30 via-transparent to-white/10"></div>
        
        <!-- Vibrant Subtle Glows -->
        <div class="absolute top-[-5%] right-[-10%] w-[55vw] h-[55vw] bg-brand/30 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-15%] w-[65vw] h-[65vw] bg-brand/50 rounded-full blur-[150px]"></div>
        <div class="absolute top-[40%] right-[-5%] w-[30vw] h-[30vw] bg-[#FF9D5C]/25 rounded-full blur-[90px]"></div>
    </div>



    <!-- Main Card -->
    <div class="container mx-auto px-4 z-10 flex items-center justify-center">
        <div
            class="w-full max-w-[850px] bg-white rounded-[32px] shadow-[0_0_60px_-15px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col md:flex-row relative border border-brand/10">

            <!-- Left Branding Side -->
            <div class="w-full hidden md:block md:w-[45%] relative min-h-[300px] md:min-h-auto group overflow-hidden bg-brand/5">
                <!-- Happy Customer Lifestyle Image - Static -->
                <img src="tapgo_happy_customer_v6_1777956049993.png"
                    class="absolute inset-0 w-full h-full object-cover"
                    alt="TapGO Happy Customer">
                
                <!-- Orange Gradient Blur (Right to Left) - Softened -->
                <div class="absolute inset-0 bg-gradient-to-l from-brand via-brand/85 to-brand/40 backdrop-blur-[8px]"></div>
                
                <!-- Subtle dark vignette for text clarity on the left -->
                <div class="absolute inset-0 bg-gradient-to-r from-black/30 via-transparent to-transparent"></div>
                
                <!-- Content Area -->
                <div class="relative z-10 p-8 lg:p-9 flex flex-col justify-between h-full text-white">
                    <!-- Top Section: Logo -->
                    <a href="index.html"
                        class="flex items-center gap-3 transform hover:scale-105 transition origin-left w-max">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-2xl border border-white/50">
                            <i class="fas fa-tags text-brand text-lg"></i>
                        </div>
                        <span class="text-2xl font-black tracking-tight drop-shadow-lg text-white">TAPGO</span>
                    </a>

                    <!-- Middle Section: Hero Text - Balanced & Spacious -->
                    <div class="flex-grow flex flex-col justify-center">
                        <div class="mb-5">
                            <span class="inline-block px-4 py-1.5 bg-white/20 backdrop-blur-md border border-white/30 text-white text-[10px] font-black tracking-[0.2em] uppercase rounded-full shadow-sm">
                                Hệ sinh thái Voucher
                            </span>
                        </div>
                        <h2 class="text-4xl lg:text-5xl font-black mb-6 leading-[1.1] tracking-tighter drop-shadow-2xl text-white">
                            Mở Khóa <br>Ưu Đãi Vô Tận
                        </h2>
                        <p class="text-white text-[16px] lg:text-[17px] leading-relaxed max-w-[320px] font-light italic drop-shadow-md opacity-95">
                            Tham gia cộng đồng <span class="font-semibold italic border-b-2 border-white/40 text-white">TAPGO</span> ngay hôm nay để nhận voucher độc quyền.
                        </p>
                    </div>

                    <!-- Bottom Section: Stats - Compact -->
                    <div class="grid grid-cols-2 gap-4 pt-6 border-t border-white/20 mt-6">
                        <div class="space-y-0.5 group/stat cursor-default">
                            <p class="text-3xl lg:text-4xl font-black tracking-tighter drop-shadow-lg transition-transform duration-300 group-hover/stat:-translate-y-1 text-white">500K+</p>
                            <p class="text-white/80 text-[10px] font-black uppercase tracking-[0.2em]">Thành viên</p>
                        </div>
                        <div class="space-y-0.5 group/stat cursor-default">
                            <p class="text-3xl lg:text-4xl font-black tracking-tighter drop-shadow-lg transition-transform duration-300 group-hover/stat:-translate-y-1 text-white">1,200+</p>
                            <p class="text-white/80 text-[10px] font-black uppercase tracking-[0.2em]">Đối tác uy tín</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Form Side -->
            <div class="w-full md:w-[55%] p-8 pt-10 md:p-10 bg-white relative">
                <!-- Close Button -->
                <a href="index.html"
                    class="absolute top-6 right-6 w-10 h-10 bg-gray-50 hover:bg-gray-100 text-gray-400 hover:text-gray-600 rounded-full flex items-center justify-center transition-colors border border-gray-100">
                    <i class="fas fa-times text-lg"></i>
                </a>

                <!-- Custom Auth Tabs -->
                <div class="flex items-center gap-8 mb-10 border-b border-gray-100">
                    <button @click="tabAuth = 'login'" class="pb-3 text-[16px] transition relative overflow-hidden"
                        :class="tabAuth === 'login' ? 'text-brand font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'">
                        Đăng Nhập
                        <span
                            class="absolute bottom-0 left-0 w-full h-[3px] bg-brand rounded-t-lg transition-transform duration-300"
                            :class="tabAuth === 'login' ? 'scale-x-100' : 'scale-x-0'"></span>
                    </button>
                    <button @click="tabAuth = 'register'" class="pb-3 text-[16px] transition relative overflow-hidden"
                        :class="tabAuth === 'register' ? 'text-brand font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'">
                        Đăng Ký Mới
                        <span
                            class="absolute bottom-0 left-0 w-full h-[3px] bg-brand rounded-t-lg transition-transform duration-300"
                            :class="tabAuth === 'register' ? 'scale-x-100' : 'scale-x-0'"></span>
                    </button>
                </div>

                <!-- LOGIN FORM -->
                <div x-show="tabAuth === 'login'"
                    x-transition:enter="transition ease-out duration-300 transform outline-none"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0" style="display:none;" class="outline-none">
                    <form @submit.prevent="login()" class="space-y-5 lg:space-y-6">
                        <div>
                            <label class="block text-[13px] font-bold text-gray-700 mb-2">Số điện thoại hoặc
                                Email</label>
                            <div class="relative group">
                                <i
                                    class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[14px] group-focus-within:text-brand transition"></i>
                                <input type="text" placeholder="Nhập số điện thoại/email"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-11 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <label class="block text-[13px] font-bold text-gray-700">Mật khẩu</label>
                                <a href="#" class="text-[12px] text-brand hover:underline font-medium">Quên mật
                                    khẩu?</a>
                            </div>
                            <div class="relative group">
                                <i
                                    class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[14px] group-focus-within:text-brand transition"></i>
                                <input :type="showPass ? 'text' : 'password'" placeholder="••••••••"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-11 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                                <button type="button" @click="showPass = !showPass"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition p-1">
                                    <i class="fas" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
                                </button>
                            </div>
                        </div>

                        <div class="pt-2">
                            <button type="submit"
                                class="w-full bg-[#F48133] text-white font-bold py-4 rounded-xl hover:-translate-y-0.5 transition-all text-[15px] uppercase tracking-wide">
                                Đăng Nhập Hệ Thống
                            </button>
                        </div>
                    </form>

                    <div class="mt-8">
                        <div class="relative flex items-center py-5">
                            <div class="flex-grow border-t border-gray-100"></div>
                            <span
                                class="flex-shrink-0 mx-4 text-gray-400 text-[11px] font-bold uppercase tracking-widest text-center">Hoặc
                                đăng nhập với</span>
                            <div class="flex-grow border-t border-gray-100"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button
                                class="flex items-center justify-center gap-2 border border-gray-200 bg-white rounded-xl py-3.5 hover:bg-gray-50 hover:border-gray-300 transition cursor-pointer group">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                                    class="w-5 h-5 group-hover:scale-110 transition" alt="Google">
                                <span class="text-[13px] font-bold text-gray-700">Google</span>
                            </button>
                            <button
                                class="flex items-center justify-center gap-2 border border-blue-100 bg-blue-50/50 rounded-xl py-3.5 hover:bg-blue-50 hover:border-blue-200 transition cursor-pointer group">
                                <i class="fab fa-facebook text-[#1877F2] text-xl group-hover:scale-110 transition"></i>
                                <span class="text-[13px] font-bold text-[#1877F2]">Facebook</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- REGISTER FORM -->
                <div x-show="tabAuth === 'register'"
                    x-transition:enter="transition ease-out duration-300 transform outline-none"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0" style="display:none;" class="outline-none">
                    <form @submit.prevent="login()" class="space-y-4 lg:space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[13px] font-bold text-gray-700 mb-2">Họ</label>
                                <input type="text" placeholder="Nguyễn"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                            </div>
                            <div>
                                <label class="block text-[13px] font-bold text-gray-700 mb-2">Tên</label>
                                <input type="text" placeholder="Văn A"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[13px] font-bold text-gray-700 mb-2">Số điện thoại</label>
                            <div class="relative group">
                                <i
                                    class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[14px] group-focus-within:text-brand transition"></i>
                                <input type="tel" placeholder="09xxxxxx"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-11 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[13px] font-bold text-gray-700 mb-2">Mật khẩu</label>
                            <div class="relative group">
                                <i
                                    class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[14px] group-focus-within:text-brand transition"></i>
                                <input :type="showPass ? 'text' : 'password'" placeholder="••••••••"
                                    class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-11 py-3.5 text-[15px] focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/10 focus:bg-white transition"
                                    required>
                                <button type="button" @click="showPass = !showPass"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition p-1">
                                    <i class="fas" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 pt-2 pb-1">
                            <input type="checkbox" id="terms"
                                class="mt-1 w-4 h-4 text-brand bg-white border-gray-300 rounded focus:ring-brand focus:ring-2 accent-brand cursor-pointer"
                                required>
                            <label for="terms" class="text-[13px] text-gray-600 leading-relaxed">Tôi đồng ý với <a
                                    href="#" class="text-brand hover:underline font-bold">Điều khoản dịch vụ</a> và <a
                                    href="#" class="text-brand hover:underline font-bold">Chính sách bảo mật</a> của
                                TAPGO.</label>
                        </div>

                        <div class="pt-2">
                            <button type="submit"
                                class="w-full bg-[#111827] text-white font-bold py-4 rounded-xl hover:-translate-y-0.5 hover:bg-black transition-all text-[15px] uppercase tracking-wide">
                                Tạo Tài Khoản Nhanh
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
