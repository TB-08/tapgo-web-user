<!-- Vendor Login Portal Build Trigger -->
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Đối Tác | TapGO Business Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
        }

        /* Cinematic Background with Outer-Edge Light Spill */
        .bg-dynamic {
            background: radial-gradient(circle at 110% -10%, #F48133 0%, #0F172A 75%, #000 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* Refined Stacked Dashboard Layers */
        .bg-layer-1 {
            background-image: url('tapgo_ui_collage_blur_1777828358846.png');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            position: fixed;
            inset: 0;
            z-index: -3;
            filter: grayscale(0.5) blur(3px); /* Subtle blur as requested */
            animation: drift 80s linear infinite alternate;
        }

        .bg-layer-2 {
            background-image: url('tapgo_vendor_v3_mockup_1777828672432.png');
            background-size: 55%;
            background-repeat: no-repeat;
            background-position: center bottom;
            opacity: 0.25;
            position: fixed;
            inset: 0;
            z-index: -2;
            filter: grayscale(0.2) blur(6px);
            animation: drift-reverse 60s linear infinite alternate;
        }

        .bg-layer-3 {
            background-image: url('tapgo_ui_collage_blur_1777828358846.png');
            background-size: cover;
            background-position: top left;
            opacity: 0.15;
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: grayscale(0.3) blur(8px);
            mix-blend-mode: hard-light;
        }

        @keyframes drift {
            from { transform: scale(1.1) translate(-20px, -20px); }
            to { transform: scale(1.2) translate(20px, 20px); }
        }

        @keyframes drift-reverse {
            from { transform: scale(1.2) translate(20px, 20px); }
            to { transform: scale(1.1) translate(-20px, -20px); }
        }

        .portal-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 820px;
            height: 580px;
        }

        .input-premium {
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-premium:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #F48133;
            transform: translateY(-2px);
        }

        .headline-gradient {
            background: linear-gradient(135deg, #F48133 0%, #FF9A5A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            padding: 0.1em 0;
            margin: -0.1em 0;
            filter: none;
        }

        .btn-brand {
            background: linear-gradient(135deg, #F48133 0%, #E06B1F 100%);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-brand:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }

        .mask-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.7), transparent);
            backdrop-filter: blur(20px);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .float-anim {
            animation: float-soft 12s ease-in-out infinite;
        }

        @keyframes float-soft {
            0%, 100% { transform: translateY(0) rotate(0.5deg); }
            50% { transform: translateY(-15px) rotate(-0.5deg); }
        }

        .logo-btn-white {
            background: #FFFFFF;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .logo-btn-white:hover {
            transform: scale(1.05) translateY(-2px);
            border-color: #F48133;
        }

        .reveal {
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.98) translateY(20px);
        }

        @keyframes reveal {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

<body x-data="getTapgoData()" class="flex items-center justify-center p-6 lg:p-8 relative min-h-screen w-full bg-[#0a0a0a] font-sans antialiased overflow-hidden selection:bg-[#F48133] selection:text-white">

    <div class="bg-dynamic"></div>
    <div class="bg-layer-1"></div>
    <div class="bg-layer-2"></div>
    <div class="bg-layer-3"></div>



    <!-- Main Container -->
    <div class="portal-glass rounded-[2.5rem] overflow-hidden flex flex-col lg:flex-row reveal border border-white/10 mx-auto">
        
        <!-- LEFT: Branding Section (42%) -->
        <div class="lg:w-[42%] p-6 lg:p-8 flex flex-col justify-between relative overflow-hidden border-r border-white/5 bg-white/[0.01]">
            <div class="mask-blur"></div>

            <div class="relative z-10 flex flex-col h-full">
                <!-- Branding Header -->
                <div class="flex mb-6">
                    <button class="logo-btn-white px-5 py-2.5 rounded-[1rem] flex items-center justify-center group">
                        <img src="Tap Go-Photoroom.png" class="h-5 w-auto object-contain" alt="TapGO Logo">
                    </button>
                </div>

                <!-- Headline -->
                <div class="space-y-2 mb-3">
                    <h1 class="text-4xl lg:text-5xl font-bold text-white leading-[1.1] tracking-tighter antialiased">
                        Kiến tạo <br>
                        <span class="headline-gradient whitespace-nowrap px-1">tăng trưởng</span> <br>
                        bền vững.
                    </h1>
                    <p class="text-white/40 text-xs font-light leading-relaxed max-w-[220px]">
                        Số hóa vận hành, khai phá tiềm năng kinh doanh cùng hệ sinh thái đối tác TapGO.
                    </p>
                </div>

                <!-- Dashboard Mockup -->
                <div class="relative mt-auto flex-1 flex items-end justify-center pt-2 pb-0">
                    <div class="relative float-anim w-full">
                        <img src="tapgo_vendor_v3_mockup_1777828672432.png" 
                             class="w-full rounded-[1.2rem] border border-white/10 brightness-110 contrast-105">
                        <div class="absolute -inset-6 bg-[#F48133]/20 blur-[50px] rounded-full -z-10 opacity-60"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT: Form Section (58%) -->
        <div class="lg:w-[58%] p-8 lg:p-10 flex flex-col justify-center bg-black/30">
            <div class="max-w-[360px] mx-auto w-full" x-data="{ loading: false, showPass: false }">
                <div class="mb-8">
                    <h2 class="text-3xl lg:text-4xl font-bold text-white tracking-tight mb-3 antialiased">Đăng Nhập</h2>
                    <p class="text-white/40 font-medium text-xs leading-relaxed">Truy cập vào hệ thống quản trị dành riêng cho đối tác chiến lược.</p>
                </div>

                <form @submit.prevent="loading = true; setTimeout(() => window.location.href='vendor_website.html', 1500)" class="space-y-5">
                    <!-- Email -->
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-white/30 uppercase tracking-[0.2em] ml-1">Email / Merchant ID</label>
                        <div class="relative group">
                            <i class="fas fa-user-shield absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-[#F48133] transition-colors duration-300 text-sm"></i>
                            <input type="text" required
                                class="w-full pl-10 pr-4 py-4 rounded-2xl outline-none input-premium font-bold text-sm placeholder:text-white/5"
                                placeholder="merchant@tapgo.vn">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[10px] font-bold text-white/30 uppercase tracking-[0.2em]">Mật khẩu truy cập</label>
                            <a href="#" class="text-[11px] font-bold text-[#F48133] hover:underline transition-all">Quên mật khẩu?</a>
                        </div>
                        <div class="relative group">
                            <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-[#F48133] transition-colors duration-300 text-sm"></i>
                            <input :type="showPass ? 'text' : 'password'" required
                                class="w-full pl-10 pr-10 py-4 rounded-2xl outline-none input-premium font-bold text-sm placeholder:text-white/5"
                                placeholder="••••••••">
                            <button type="button" @click="showPass = !showPass" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-[#F48133] transition-all text-sm">
                                <i class="fas" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="flex items-center justify-between px-1">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-4 h-4 rounded border border-white/10 bg-white/5 text-[#F48133] peer-checked:bg-[#F48133] peer-checked:border-[#F48133] transition-all"></div>
                                <i class="fas fa-check absolute top-[3px] left-[3px] text-[8px] text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                            </div>
                            <span class="text-xs font-bold text-white/30 group-hover:text-white/60 transition-colors">Duy trì đăng nhập</span>
                        </label>
                        <div class="flex items-center gap-1 text-white/10 font-bold text-[9px] tracking-widest uppercase">
                            <i class="fas fa-shield-check"></i>
                            <span>Secure Node</span>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" 
                        class="btn-brand w-full py-4 rounded-[2rem] text-white font-bold tracking-[0.2em] text-[11px] flex items-center justify-center gap-3">
                        <span x-show="!loading">VÀO HỆ THỐNG QUẢN TRỊ</span>
                        <div x-show="loading" class="flex gap-2 items-center">
                            <span class="w-2 h-2 bg-white rounded-full animate-bounce"></span>
                            <span class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:-0.15s]"></span>
                            <span class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:-0.3s]"></span>
                        </div>
                    </button>
                </form>

                <!-- Onboarding -->
                <div class="mt-8 text-center">
                    <p class="text-white/20 text-xs font-medium mb-3">Bạn đang tìm kiếm giải pháp quà tặng điện tử?</p>
                    <button class="w-full py-3 rounded-2xl border-2 border-white/5 font-bold text-white/40 hover:bg-white/5 hover:border-white/10 hover:text-white transition-all duration-500 text-[10px] tracking-widest uppercase">
                        Gửi yêu cầu hợp tác ngay
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
